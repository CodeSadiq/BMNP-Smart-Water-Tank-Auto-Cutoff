<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | BMNP</title>
  <link rel="stylesheet" href="contact.css" />
</head>
<body>

  <nav class="contact-navbar">
    <h2>BMNP</h2>
    <a href="index.html"><h2>Home</h2></a>
  </nav>

  <section class="contact-hero">
    <div class="hero-text">
      <h1>Let’s Connect</h1>
      <p>Have questions about our smart water solutions? We’re here to help.</p>
    </div>
  </section>

  <section class="contact-container">
    <div class="contact-info">
      <h2>Get in Touch</h2>
      <p><strong>Address:</strong> MIT Muzaffarpur, Bihar, India</p>
      <p><strong>Email:</strong> contact@bmnp.in</p>
      <p><strong>Phone:</strong> +91 98765 43210</p>
      <div class="social-links">
        <a href="https://wa.me/917634075521"><img src="./images/whatsapp.png" alt="whatsapp"></a>
        <a href="https://www.instagram.com/bmnp_innovations_pvt?igsh=ZGdnaGhiNDU1ZnIz"><img src="./images/instagram.png" alt="instagram"></a>
        <a href="https://www.linkedin.com/company/bmnp-innovations-private-limited/"><img src="./images/linkedin.svg" alt="linkedin"></a>
      </div>
    </div>

    <form class="contact-form">
      <h2>Send Us a Message</h2>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea placeholder="Your Message" rows="5" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </section>

  <footer class="contact-footer">
    <p>© 2025 BMNP | All Rights Reserved</p>
  </footer>

  <script src="contact.js"></script>
</body>
</html>
